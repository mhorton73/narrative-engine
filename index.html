<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Text Adventure</title>
</head>
<body>
  <h2 id="story"></h2>

  <div id="choices"></div>

  <br>
  <button id="restart">Restart</button>

  <script>
    let sessionId = null;

    async function startGame() {
      const res = await fetch("http://localhost:8000/start", {
        method: "POST"
      });

      const data = await res.json();

      sessionId = data.session_id;
      renderNode(data.node, sessionId);
    }

    function renderNode(node, sessionId) {
      const storyEl = document.getElementById("story");
      const choicesEl = document.getElementById("choices");

      storyEl.innerText = node.text;
      choicesEl.innerHTML = "";

      if (!node.choices || node.choices.length === 0) {
        choicesEl.innerHTML = "<p><b>Game Over</b></p>";
        fetch("http://localhost:8000/close-session?session_id=${sessionId}", {
        method: "POST"
      });
        return;
      }

      node.choices.forEach((choice, index) => {
        const btn = document.createElement("button");
        btn.innerText = choice.text;

        btn.onclick = () => makeChoice(index);

        choicesEl.appendChild(btn);
        choicesEl.appendChild(document.createElement("br"));
      });
    }

    async function makeChoice(index) {
      const res = await fetch(
        `http://localhost:8000/choose?session_id=${sessionId}&choice_index=${index}`,
        { method: "POST" }
      );

      const data = await res.json();
      renderNode(data.node);
    }

    document.getElementById("restart").onclick = startGame;

    // start game on load
    startGame();
  </script>
</body>
</html>
